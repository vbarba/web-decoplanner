name: Deploy to GitHub Pages

# Deploys the static HALDANE app (plain HTML/CSS/JS, no build step) to
# GitHub Pages on every push to the default branch, and on demand.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run test suites (no deps, no framework)
        run: |
          node tests/zhl16.test.js
          node tests/vpmb.test.js
          node tests/i18n.test.js
          node js/ui/charts.js

  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          # Auto-enable Pages (Actions build type) if it is not yet configured,
          # so a fresh clone of this repo deploys without manual setup.
          enablement: true

      - name: Stage site (web app only — exclude desktop packaging + tooling)
        # The published site is just the static web app. Everything that exists
        # only to BUILD the desktop app or the release (desktop/, scripts/,
        # tests, docs, CI) must NOT reach the public Pages site. Keep .nojekyll
        # (disables Jekyll), css/, js/, index.html, and the published CHANGELOG/LICENSE.
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude '.git' \
            --exclude 'desktop' \
            --exclude 'scripts' \
            --exclude 'tests' \
            --exclude 'docs' \
            --exclude '.github' \
            --exclude '.shots' \
            --exclude '.claude' \
            --exclude 'node_modules' \
            --exclude '_site' \
            --exclude 'cliff.toml' \
            ./ _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Only the staged web app (see the Stage step above), not the repo root.
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
